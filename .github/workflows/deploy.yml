name: Build and Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build fat JARs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build all modules
        working-directory: theKnife
        run: mvn package -DskipTests -q

      - name: Upload ServerTK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ServerTK
          path: theKnife/serverTK/target/ServerTK.jar
          retention-days: 30

      - name: Upload ClientTK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClientTK
          path: theKnife/clientTK/target/ClientTK.jar
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download ServerTK
        uses: actions/download-artifact@v4
        with:
          name: ServerTK

      - name: Download ClientTK
        uses: actions/download-artifact@v4
        with:
          name: ClientTK

      - name: Create release with JARs
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ServerTK.jar
            ClientTK.jar
          generate_release_notes: true
